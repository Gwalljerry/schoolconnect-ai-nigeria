<script>

function checkResult(){

let name = document.getElementById("studentName").value;

let data = localStorage.getItem(name);

if(!data){
alert("No result found");
return;
}

let r = JSON.parse(data);

// CALCULATIONS
let total = r.english.total + r.math.total;
let average = total / 2;

let remark = average >= 70 ? "Excellent" :
average >= 60 ? "Good" :
average >= 50 ? "Fair" : "Fail";

let html = `
<div style="border:2px solid black; padding:20px; width:80%; margin:auto; background:white;">

<img src="${r.logo}" width="80"><br>

<h2>${r.school}</h2>
<h3>Student Report Card</h3>

<p><b>Name:</b> ${r.student}</p>
<p><b>Class:</b> ${r.class}</p>
<p><b>Term:</b> ${r.term}</p>

<table border="1" style="width:100%; text-align:center;">
<tr>
<th>Subject</th><th>CA1</th><th>CA2</th><th>Exam</th><th>Total</th><th>Grade</th>
</tr>

<tr>
<td>English</td>
<td>${r.english.ca1}</td>
<td>${r.english.ca2}</td>
<td>${r.english.exam}</td>
<td>${r.english.total}</td>
<td>${r.english.grade}</td>
</tr>

<tr>
<td>Mathematics</td>
<td>${r.math.ca1}</td>
<td>${r.math.ca2}</td>
<td>${r.math.exam}</td>
<td>${r.math.total}</td>
<td>${r.math.grade}</td>
</tr>

</table>

<br>

let total =
r.english.total +
r.math.total +
r.biology.total +
r.chemistry.total +
r.physics.total;

let subjects = 5;

let average = total / subjects;

let remark = average >= 75 ? "Excellent" :
average >= 65 ? "Very Good" :
average >= 50 ? "Good" : "Fail";

<br>
<button onclick="window.print()">Print Result</button>

</div>
`;

document.getElementById("resultArea").innerHTML = html;

}
</script>
