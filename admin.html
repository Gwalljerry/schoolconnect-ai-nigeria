<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Admin Panel - Approve Teachers</h2>

<input type="text" id="teacherName" placeholder="Teacher Name"><br><br>

<button onclick="approve()">Approve Teacher</button>

<p id="msg"></p>

<script>

function approve(){
let name = document.getElementById("teacherName").value;

if(name==""){
alert("Enter teacher name");
return;
}

// Save approved teacher
localStorage.setItem("teacher_" + name, "approved");

document.getElementById("msg").innerText = name + " Approved!";
}

</script>

</body>
</html>
