<!DOCTYPE html>
<html>
<head>
<title>Teacher Result Upload</title>
<style>
body{font-family:Arial; text-align:center;}
input, select{padding:8px; margin:5px;}
</style>
</head>

<body>

<h2>Upload Student Result</h2>

<h3>Select Class</h3>
<select id="classSelect" onchange="loadStudents()">
<option value="">Select Class</option>
<option value="JS1">JS1</option>
<option value="JS2">JS2</option>
<option value="SS1">SS1</option>
<option value="SS2">SS2</option>
</select>

<br>

<select id="studentSelect">
<option>Select Student</option>
</select>

<br><br>

<input type="text" id="school" placeholder="School Name"><br>
<input type="text" id="logo" placeholder="School Logo URL"><br>
<input type="text" id="term" placeholder="Term (1st, 2nd, 3rd)"><br>

<h3>English</h3>
<input type="number" id="eng1" placeholder="CA1">
<input type="number" id="eng2" placeholder="CA2">
<input type="number" id="engexam" placeholder="Exam"><br>

<h3>Mathematics</h3>
<input type="number" id="math1" placeholder="CA1">
<input type="number" id="math2" placeholder="CA2">
<input type="number" id="mathexam" placeholder="Exam"><br>

<button onclick="save()">Save Result</button>

<p id="msg"></p>

<script>

// STUDENTS
let students = {
JS1: ["Amina Musa","John Bala","Grace Luka"],
JS2: ["Peter Dan","Mary Audu"],
SS1: ["Daniel James","Ruth Paul"],
SS2: ["Samuel John","Blessing David"]
};

// LOAD STUDENTS
function loadStudents(){
let cls = document.getElementById("classSelect").value;
let list = students[cls] || [];

let dropdown = document.getElementById("studentSelect");
dropdown.innerHTML = "";

list.forEach(function(name){
let option = document.createElement("option");
option.text = name;
dropdown.add(option);
});
}

// CALCULATE
function calc(a,b,c){
let total =
Number(document.getElementById(a).value) +
Number(document.getElementById(b).value) +
Number(document.getElementById(c).value);

return {
ca1: document.getElementById(a).value,
ca2: document.getElementById(b).value,
exam: document.getElementById(c).value,
total: total,
grade: total >= 70 ? "A" : total >=60 ? "B" : total >=50 ? "C" : "F"
};
}

// SAVE RESULT
function save(){

let student = document.getElementById("studentSelect").value;

if(student === "Select Student"){
alert("Select student");
return;
}

let data = {
school: document.getElementById("school").value,
logo: document.getElementById("logo").value,
student: student,
class: document.getElementById("classSelect").value,
term: document.getElementById("term").value,

english: calc("eng1","eng2","engexam"),
math: calc("math1","math2","mathexam")
};

// TOTAL
let total = data.english.total + data.math.total;
data.total = total;

// SAVE SINGLE
localStorage.setItem(student, JSON.stringify(data));

// SAVE ALL (for position)
let all = JSON.parse(localStorage.getItem("allResults")) || [];
all.push(data);
localStorage.setItem("allResults", JSON.stringify(all));

document.getElementById("msg").innerText = "Saved Successfully!";
}

</script>

</body>
</html>
