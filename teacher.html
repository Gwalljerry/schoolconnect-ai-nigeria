<!DOCTYPE html>
<html>
<head>
<title>Teacher Result Upload</title>
<style>
body{font-family:Arial; text-align:center;}
input{padding:8px; margin:5px;}
table{margin:auto;}
</style>
</head>

<body>

<h2>Upload Student Result</h2>

<input type="text" id="school" placeholder="School Name"><br>
<input type="text" id="student" placeholder="Student Full Name"><br>
<input type="text" id="class" placeholder="Class (JSS1, SS2 etc)"><br>
<input type="text" id="term" placeholder="Term (1st, 2nd, 3rd)"><br>

<h3>English</h3>
<input type="number" id="eng1" placeholder="1st CA">
<input type="number" id="eng2" placeholder="2nd CA">
<input type="number" id="engexam" placeholder="Exam"><br>

<h3>Mathematics</h3>
<input type="number" id="math1" placeholder="1st CA">
<input type="number" id="math2" placeholder="2nd CA">
<input type="number" id="mathexam" placeholder="Exam"><br>

<button onclick="save()">Save Result</button>

<script>
function save(){

let data = {
school: document.getElementById("school").value,
student: document.getElementById("student").value,
class: document.getElementById("class").value,
term: document.getElementById("term").value,

english: calc("eng1","eng2","engexam"),
math: calc("math1","math2","mathexam")
};

localStorage.setItem(data.student, JSON.stringify(data));

alert("Saved!");
}

function calc(a,b,c){
let total = Number(document.getElementById(a).value) +
Number(document.getElementById(b).value) +
Number(document.getElementById(c).value);

return {
ca1: document.getElementById(a).value,
ca2: document.getElementById(b).value,
exam: document.getElementById(c).value,
total: total,
grade: total >= 70 ? "A" : total >=60 ? "B" : total >=50 ? "C" : "F"
};
}
</script>

</body>
</html>
