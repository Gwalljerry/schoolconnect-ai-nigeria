<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolConnect AI Lite - Nigerian School Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <header>
        <h1>🎓 SchoolConnect AI Lite</h1>
        <p>Offline School Management System for Nigerian Boarding Schools</p>
    </header>

    <main>
        <!-- Login Screen -->
        <section id="login-screen" class="mode active">
            <h2>Teacher Login</h2>
            <input type="password" id="teacher-password" placeholder="Enter password">
            <button id="login-btn">Login</button>
        </section>

        <!-- Teacher Dashboard -->
        <section id="teacher-dashboard" class="mode hidden">
            <h2>Upload Results</h2>
            <form id="score-form">
                <div class="input-group">
                    <label>Student Name:</label>
                    <input type="text" id="student-name" required>
                </div>
                <div class="input-group">
                    <label>Exam Number (10 digits):</label>
                    <input type="text" id="exam-number" pattern="[0-9]{10}" maxlength="10" required>
                </div>
                <div class="input-group">
                    <label>Subject:</label>
                    <select id="subject">
                        <option>English</option>
                        <option>Math</option>
                        <option>Biology</option>
                        <option>Physics</option>
                        <option>Chemistry</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>CA1 (30):</label>
                    <input type="number" id="ca1" min="0" max="30">
                </div>
                <div class="input-group">
                    <label>CA2 (30):</label>
                    <input type="number" id="ca2" min="0" max="30">
                </div>
                <div class="input-group">
                    <label>Exam (40):</label>
                    <input type="number" id="exam" min="0" max="40">
                </div>
                <button type="submit">Upload Result</button>
            </form>
            <button id="print-all">🖨️ Print All Report Cards</button>
            <button id="logout">Logout</button>
        </section>

        <!-- Parent Check Screen -->
        <section id="parent-screen" class="mode">
            <h2>Parent Result Checker</h2>
            <input type="text" id="parent-exam-number" placeholder="Enter 10-digit Exam Number" pattern="[0-9]{10}">
            <button id="check-result">Check Result</button>
            <div id="parent-result"></div>
        </section>

        <!-- Results List (Teacher) -->
        <section id="results-list" class="hidden">
            <h2>Saved Results</h2>
            <div id="results-display"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
