<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f7fa;">

<h2>Select Language / Zaɓi Harshe</h2>

<button onclick="setLang('eng')">English</button>
<button onclick="setLang('hausa')">Hausa</button>

<div id="quizArea"></div>

<script>

let lang = "eng";

function setLang(selected){
lang = selected;
loadQuestion();
}

function loadQuestion(){
let question = "";
let correct = 4;

if(lang === "eng"){
question = "What is 2 + 2?";
}else{
question = "Nawa ne 2 + 2?";
}

let html = `
<h3 style="font-size:24px;">${question}</h3>
<button onclick="check(4)">4</button>
<button onclick="check(5)">5</button>
`;

document.getElementById("quizArea").innerHTML = html;
}

function check(ans){
let message = "";

if(ans === 4){
localStorage.setItem("score", 1);
message = (lang === "eng") ? "Correct!" : "Dai dai ne!";
}else{
localStorage.setItem("score", 0);
message = (lang === "eng") ? "Wrong!" : "Ba dai ba!";
}

document.getElementById("quizArea").innerHTML =
`<h3>${message}</h3><br>
<a href="dashboard.html"><button>Go to Dashboard</button></a>`;
}

</script>

</body>
</html>
