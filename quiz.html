<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f7fa;">

<h2 style="font-size:28px;">Simple Quiz</h2>

<p style="font-size:24px;">What is 2 + 2?</p>

<button onclick="checkAnswer(4)" style="font-size:20px; padding:10px 20px;">4</button>
<button onclick="checkAnswer(5)" style="font-size:20px; padding:10px 20px;">5</button>

<p id="result" style="font-size:22px; margin-top:20px;"></p>

<p>What is 2 + 2?</p>

<button onclick="checkAnswer(4)">4</button>
<button onclick="checkAnswer(5)">5</button>

<p id="result"></p>

<script>
function checkAnswer(answer){
if(answer === 4){
document.getElementById("result").innerText = "Correct!";
localStorage.setItem("score", 1);
}else{
document.getElementById("result").innerText = "Wrong!";
localStorage.setItem("score", 0);
}
}
</script>

</body>
</html>
