<!DOCTYPE html>
<html>
<head>
<title>English Quiz</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f7fa;">

<h2>English CBT Quiz</h2>

<h3 id="timer" style="color:red;"></h3>

<div id="quizArea"></div>

<script>

let current = 0;
let score = 0;
let time = 60;
let timerInterval;

let questions = [
{
q: "Choose the correct spelling:",
options: ["Recieve","Receive","Receeve"],
answer: "Receive",
exp: "Receive is the correct spelling."
},
{
q: "Synonym of Happy:",
options: ["Sad","Joyful","Angry"],
answer: "Joyful",
exp: "Happy means joyful or glad."
},
{
q: "Opposite of Big:",
options: ["Large","Huge","Small"],
answer: "Small",
exp: "Small is the opposite of big."
}
];

function startQuiz(){
current = 0;
score = 0;
time = 60;
startTimer();
loadQuestion();
}

function startTimer(){
timerInterval = setInterval(function(){
document.getElementById("timer").innerText = "Time left: " + time + "s";
time--;

if(time < 0){
clearInterval(timerInterval);
endQuiz();
}
},1000);
}

function loadQuestion(){
let q = questions[current];

let html = "<h3>" + q.q + "</h3>";

q.options.forEach(function(opt){
html += "<button onclick=\"checkAnswer('" + opt + "')\">" + opt + "</button><br><br>";
});

document.getElementById("quizArea").innerHTML = html;
}

function checkAnswer(selected){
let q = questions[current];

if(selected === q.answer){
score++;
}

document.getElementById("quizArea").innerHTML =
"<h3>" + (selected === q.answer ? "Correct!" : "Wrong!") + "</h3>" +
"<p>" + q.exp + "</p>" +
"<button onclick='nextQuestion()'>Next</button>";
}

function nextQuestion(){
current++;

if(current < questions.length){
loadQuestion();
}else{
endQuiz();
}
}

function endQuiz(){
clearInterval(timerInterval);

localStorage.setItem("score", score);

document.getElementById("quizArea").innerHTML =
"<h3>Final Score: " + score + "/" + questions.length + "</h3>" +
"<p>" + (score >= 2 ? "Good performance!" : "You need improvement.") + "</p>" +
"<a href='dashboard.html'><button>Go to Dashboard</button></a>";
}

startQuiz();

</script>

</body>
</html>
