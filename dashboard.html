<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Student Dashboard</h2>

<p id="score"></p>

<script>
let score = localStorage.getItem("score");

if(score){
document.getElementById("score").innerText = "Your Last Score: " + score;
}else{
document.getElementById("score").innerText = "No score yet. Take a quiz!";
}
</script>

</body>
</html>
